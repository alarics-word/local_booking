<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SCHOOLBOOK — Approvals</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="nav-ph"></div>
  <div class="page-wrap" style="position:relative;z-index:1;">
    <div class="page-header">
      <h1>// APPROVAL QUEUE</h1>
      <p style="font-family:var(--mono);font-size:.72rem;color:var(--text3);">Review and act on requests assigned to your role.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-q" onclick="switchTab('queue')">PENDING ACTION</button>
      <button class="tab-btn" id="tab-h" onclick="switchTab('history')">MY HISTORY</button>
    </div>

    <div id="tab-content">
      <div style="font-family:var(--mono);color:var(--text3);padding:3rem;text-align:center;">LOADING...</div>
    </div>
  </div>

  <!-- REVIEW MODAL -->
  <div class="overlay" id="review-overlay">
    <div class="modal">
      <button class="modal-x" onclick="closeReview()">✕</button>
      <div id="review-body"></div>
    </div>
  </div>

  <script src="db.js"></script>
  <script>
    const user = requireAuth(['faculty','custodian','finance','president']);
    if (!user) throw 0;
    document.getElementById('nav-ph').innerHTML = renderNav(user);

    let curTab = 'queue';
    let activeStepId = null;
    let activeBkId   = null;

    function switchTab(tab) {
      curTab = tab;
      document.getElementById('tab-q').classList.toggle('active', tab==='queue');
      document.getElementById('tab-h').classList.toggle('active', tab==='history');
      renderTab();
    }

    function renderTab() {
      const el = document.getElementById('tab-content');
      if (curTab === 'queue') {
        const items = DB.getPendingForRole(user.role);
        if (!items.length) {
          el.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon" style="font-size:2rem;">✓</div><div class="empty-title">ALL CLEAR.</div><div class="empty-sub">No pending requests require your action.</div></div></div>`;
          return;
        }
        el.innerHTML = `<div style="display:flex;flex-direction:column;gap:1rem;">${items.map(({step,booking})=>renderCard(step,booking)).join('')}</div>`;
      } else {
        const items = DB.getHistoryForRole(user.role);
        if (!items.length) {
          el.innerHTML = `<div class="card"><div class="empty"><div class="empty-title">NO HISTORY YET.</div></div></div>`;
          return;
        }
        el.innerHTML = `
          <div class="card" style="overflow:hidden;">
            <div class="table-wrap"><table>
              <thead><tr><th>BOOKING</th><th>REQUESTER</th><th>FACILITY</th><th>DATE</th><th>MY ACTION</th><th>NOTE</th></tr></thead>
              <tbody>
                ${items.map(({step,booking})=>{
                  const u = DB.getUserById(booking.userId);
                  return `<tr>
                    <td style="font-size:.72rem;">${booking.id}</td>
                    <td>${u?.name||'—'}<br><span style="font-family:var(--mono);font-size:.68rem;color:var(--text3);">ID: ${u?.id||'—'}</span></td>
                    <td style="font-size:.82rem;">${booking.facility}</td>
                    <td style="font-size:.78rem;">${fmtDate(booking.date)}</td>
                    <td>${badge(step.status)}</td>
                    <td style="font-size:.78rem;color:var(--text2);">${step.note||'—'}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table></div>
          </div>
        `;
      }
    }

    function renderCard(step, booking) {
      const u = DB.getUserById(booking.userId);
      const allSteps = DB.getStepsForBooking(booking.id);
      return `
        <div class="card p4">
          <div class="flex-b mb2" style="flex-wrap:wrap;gap:.5rem;">
            <div>
              <div style="font-family:var(--mono);font-size:.82rem;color:var(--green);">${booking.id}</div>
              <div style="font-family:var(--mono);font-size:.68rem;color:var(--text3);">Filed ${fmtDT(booking.createdAt)}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center;">
              ${booking.useLED?'<span style="font-family:var(--mono);font-size:.65rem;color:var(--warning);border:1px solid rgba(255,204,0,.3);padding:2px 8px;border-radius:3px;">LED</span>':''}
              ${badge(booking.status)}
            </div>
          </div>

          <div class="grid-2 gap1 mb2">
            <div>
              <div class="section-label">REQUESTER</div>
              <div style="font-family:var(--mono);font-size:.8rem;">${u?.name||'—'}</div>
              <div style="font-family:var(--mono);font-size:.68rem;color:var(--text3);">ID: ${u?.id||'—'} · ${roleBadge(u?.role||'')}</div>
            </div>
            <div>
              <div class="section-label">FACILITY</div>
              <div style="font-family:var(--mono);font-size:.8rem;">${booking.facility}</div>
            </div>
            <div>
              <div class="section-label">DATE</div>
              <div style="font-family:var(--mono);font-size:.8rem;">${fmtDate(booking.date)}</div>
            </div>
            <div>
              <div class="section-label">TIME</div>
              <div style="font-family:var(--mono);font-size:.8rem;">${fmtTime(booking.timeStart)} – ${fmtTime(booking.timeEnd)}</div>
            </div>
            <div style="grid-column:span 2;">
              <div class="section-label">PURPOSE</div>
              <div style="font-family:var(--mono);font-size:.8rem;">${booking.purpose}</div>
            </div>
          </div>

          <!-- Progress bar -->
          <div class="step-bar mb2">
            ${allSteps.map(s=>{
              const c = s.status==='approved'?'var(--green)':s.status==='rejected'?'var(--danger)':s.status==='skipped'?'var(--text3)':s.id===step.id?'var(--warning)':'var(--bg3)';
              return `<div class="step-bar-seg" style="background:${c};" title="${s.label}: ${s.status}"></div>`;
            }).join('')}
          </div>
          <div style="font-family:var(--mono);font-size:.68rem;color:var(--text3);margin-bottom:1rem;">STEP ${step.order+1}/${allSteps.length}: ${step.label}</div>

          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary btn-sm" onclick="openReview('${step.id}','${booking.id}')">✓ APPROVE</button>
            <button class="btn btn-danger btn-sm"  onclick="openReview('${step.id}','${booking.id}',true)">✕ REJECT</button>
            <button class="btn btn-ghost btn-sm"   onclick="openReview('${step.id}','${booking.id}',false,true)">DETAILS</button>
          </div>
        </div>
      `;
    }

    function openReview(stepId, bkId, isReject=false, readOnly=false) {
      activeStepId = stepId;
      activeBkId   = bkId;
      const booking  = DB.getBookingById(bkId);
      const requester = DB.getUserById(booking.userId);
      const allSteps  = DB.getStepsForBooking(bkId);

      document.getElementById('review-body').innerHTML = `
        <h2>${readOnly?'// BOOKING DETAIL':'// REVIEW REQUEST'}</h2>

        <div class="grid-2 gap1 mb2">
          <div><div class="section-label">REQUESTER</div>
            <div style="font-family:var(--mono);font-size:.8rem;">${requester?.name||'—'} (${requester?.id||'—'})</div>
          </div>
          <div><div class="section-label">FACILITY</div><div style="font-family:var(--mono);font-size:.8rem;">${booking.facility}</div></div>
          <div><div class="section-label">DATE</div><div style="font-family:var(--mono);font-size:.8rem;">${fmtDate(booking.date)}</div></div>
          <div><div class="section-label">TIME</div><div style="font-family:var(--mono);font-size:.8rem;">${fmtTime(booking.timeStart)} – ${fmtTime(booking.timeEnd)}</div></div>
          <div style="grid-column:span 2;"><div class="section-label">PURPOSE</div><div style="font-family:var(--mono);font-size:.8rem;">${booking.purpose}</div></div>
          <div><div class="section-label">PARTICIPANTS</div><div style="font-family:var(--mono);font-size:.8rem;">${booking.participants}</div></div>
          <div><div class="section-label">LED WALL</div><div style="font-family:var(--mono);font-size:.8rem;">${booking.useLED?'YES':'NO'}</div></div>
          ${booking.notes?`<div style="grid-column:span 2;"><div class="section-label">NOTES</div><div style="font-size:.78rem;color:var(--text2);">${booking.notes}</div></div>`:''}
        </div>

        <div class="divider"></div>
        <div class="section-label">// APPROVAL TRAIL</div>
        <div class="steps mb2">
          ${allSteps.map((s,i)=>`
            <div class="step">
              <div class="step-dot ${s.id===stepId&&!readOnly?'active':stepDotClass(s.status)}">${s.id===stepId&&!readOnly?'→':stepDotIcon(s.status)}</div>
              <div class="step-body">
                <div class="step-title">${i+1}. ${s.label}</div>
                <div class="step-sub">${s.status.toUpperCase()}${s.actedAt?' · '+fmtDT(s.actedAt):''}</div>
                ${s.note?`<div class="step-note">"${s.note}"</div>`:''}
              </div>
            </div>
          `).join('')}
        </div>

        ${!readOnly ? `
          <div class="form-group">
            <label class="form-label">REMARKS <span style="color:var(--text3);font-size:.65rem;">(optional)</span></label>
            <textarea id="action-note" class="form-textarea" style="min-height:64px;" placeholder="Add any conditions or reason..."></textarea>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary" style="flex:1;justify-content:center;" id="approve-btn" onclick="doAction('approved')">✓ APPROVE</button>
            <button class="btn btn-danger"  style="flex:1;justify-content:center;" id="reject-btn"  onclick="doAction('rejected')">✕ REJECT</button>
          </div>
        ` : ''}
      `;
      document.getElementById('review-overlay').classList.add('open');
    }

    function doAction(action) {
      const note = document.getElementById('action-note')?.value.trim();
      document.getElementById('approve-btn').disabled = true;
      document.getElementById('reject-btn').disabled  = true;

      DB.actOnStep(activeStepId, action, note);

      const booking = DB.getBookingById(activeBkId);
      DB.addNotif(booking.userId,
        `Your booking for ${booking.facility} on ${fmtDate(booking.date)} has been ${action} by ${user.name} (${user.role}).`
      );

      toast(`Booking ${action}!`, action==='approved'?'ok':'err');
      closeReview();
      renderTab();
    }

    function closeReview() {
      document.getElementById('review-overlay').classList.remove('open');
      activeStepId = null; activeBkId = null;
    }

    document.getElementById('review-overlay').addEventListener('click', e=>{
      if (e.target===document.getElementById('review-overlay')) closeReview();
    });

    renderTab();
  </script>
</body>
</html>
