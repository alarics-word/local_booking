<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SCHOOLBOOK — Admin</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="nav-ph"></div>
  <div class="page-wrap" style="position:relative;z-index:1;">
    <div class="page-header">
      <h1>// ADMIN PANEL</h1>
      <p style="font-family:var(--mono);font-size:.72rem;color:var(--text3);">Manage accounts, approve restricted roles, and view all bookings.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">PENDING ACCOUNTS</button>
      <button class="tab-btn" id="tab-users"   onclick="switchTab('users')">ALL USERS</button>
      <button class="tab-btn" id="tab-bookings" onclick="switchTab('bookings')">ALL BOOKINGS</button>
    </div>

    <div id="tab-content">
      <div style="font-family:var(--mono);color:var(--text3);padding:3rem;text-align:center;">LOADING...</div>
    </div>
  </div>

  <!-- USER EDIT MODAL -->
  <div class="overlay" id="user-overlay">
    <div class="modal">
      <button class="modal-x" onclick="document.getElementById('user-overlay').classList.remove('open')">✕</button>
      <div id="user-modal-body"></div>
    </div>
  </div>

  <!-- BOOKING DETAIL MODAL -->
  <div class="overlay" id="bk-overlay">
    <div class="modal" style="max-width:580px;">
      <button class="modal-x" onclick="document.getElementById('bk-overlay').classList.remove('open')">✕</button>
      <div id="bk-modal-body"></div>
    </div>
  </div>

  <script src="db.js"></script>
  <script>
    const user = requireAuth(['admin','president']);
    if (!user) throw 0;
    document.getElementById('nav-ph').innerHTML = renderNav(user);

    let curTab = 'pending';

    function switchTab(tab) {
      curTab = tab;
      ['pending','users','bookings'].forEach(t=>{
        document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
      });
      renderTab();
    }

    function renderTab() {
      const el = document.getElementById('tab-content');
      const users    = DB.getUsers();
      const bookings = DB.getAllBookings();

      if (curTab === 'pending') {
        const pending = users.filter(u=>u.status==='pending');
        if (!pending.length) {
          el.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon" style="font-size:2rem;">✓</div><div class="empty-title">NO PENDING ACCOUNTS.</div><div class="empty-sub">All registrations have been reviewed.</div></div></div>`;
          return;
        }
        el.innerHTML = `
          <div style="font-family:var(--mono);font-size:.72rem;color:var(--text3);margin-bottom:.8rem;">${pending.length} ACCOUNT(S) AWAITING APPROVAL</div>
          <div style="display:flex;flex-direction:column;gap:1rem;">
            ${pending.map(u=>`
              <div class="card p4">
                <div class="flex-b mb2" style="flex-wrap:wrap;gap:.5rem;">
                  <div>
                    <div style="font-family:var(--mono);font-size:.9rem;color:var(--text);">${u.name}</div>
                    <div style="font-family:var(--mono);font-size:.7rem;color:var(--text3);">ID: ${u.id} · Registered ${fmtDate(u.createdAt)}</div>
                  </div>
                  ${roleBadge(u.role)}
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <button class="btn btn-primary btn-sm" onclick="approveUser('${u.id}','${u.name}')">✓ APPROVE</button>
                  <button class="btn btn-danger btn-sm"  onclick="rejectUser('${u.id}','${u.name}')">✕ REJECT</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;

      } else if (curTab === 'users') {
        el.innerHTML = `
          <div style="display:flex;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center;">
            <div class="searchbar" style="flex:1;min-width:180px;">
              <span class="ico">›</span>
              <input type="text" id="user-search" placeholder="search by name or id..." oninput="filterUsers()"/>
            </div>
            <select id="status-filter" class="form-select" style="width:auto;" onchange="filterUsers()">
              <option value="">ALL STATUS</option>
              <option value="active">ACTIVE</option>
              <option value="pending">PENDING</option>
              <option value="rejected">REJECTED</option>
            </select>
          </div>
          <div class="card" style="overflow:hidden;">
            <div class="table-wrap"><table>
              <thead><tr><th>NAME</th><th>ID</th><th>ROLE</th><th>STATUS</th><th>JOINED</th><th>ACTIONS</th></tr></thead>
              <tbody id="user-tbody"></tbody>
            </table></div>
          </div>
        `;
        filterUsers();

      } else { // bookings
        const stats = {
          total:    bookings.length,
          approved: bookings.filter(b=>b.status==='approved').length,
          inprog:   bookings.filter(b=>['pending','inreview'].includes(b.status)).length,
          rejected: bookings.filter(b=>b.status==='rejected').length,
        };
        el.innerHTML = `
          <div class="grid-4 mb2">
            ${[['TOTAL',stats.total,'var(--text)'],['APPROVED',stats.approved,'var(--green)'],['IN PROGRESS',stats.inprog,'var(--warning)'],['REJECTED',stats.rejected,'var(--danger)']].map(([l,n,c])=>`
              <div class="card stat-card">
                <div class="stat-val" style="color:${c};">${n}</div>
                <div class="stat-lbl">${l}</div>
              </div>
            `).join('')}
          </div>
          <div style="display:flex;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap;">
            <div class="searchbar" style="flex:1;min-width:180px;">
              <span class="ico">›</span>
              <input type="text" id="bk-search" placeholder="search bookings..." oninput="filterBookings()"/>
            </div>
            <select id="bk-status" class="form-select" style="width:auto;" onchange="filterBookings()">
              <option value="">ALL STATUS</option>
              <option value="pending">PENDING</option>
              <option value="inreview">IN REVIEW</option>
              <option value="approved">APPROVED</option>
              <option value="rejected">REJECTED</option>
            </select>
          </div>
          <div class="card" style="overflow:hidden;">
            <div class="table-wrap"><table>
              <thead><tr><th>ID</th><th>REQUESTER</th><th>FACILITY</th><th>DATE</th><th>STATUS</th><th></th></tr></thead>
              <tbody id="bk-tbody"></tbody>
            </table></div>
          </div>
        `;
        filterBookings();
      }
    }

    function filterUsers() {
      const q  = document.getElementById('user-search')?.value.toLowerCase();
      const st = document.getElementById('status-filter')?.value;
      const all = DB.getUsers();
      const filtered = all.filter(u=>{
        if (st && u.status!==st) return false;
        if (q && !`${u.name} ${u.id}`.toLowerCase().includes(q)) return false;
        return true;
      });
      const tbody = document.getElementById('user-tbody');
      if (!tbody) return;
      tbody.innerHTML = filtered.map(u=>`
        <tr>
          <td>${u.name}</td>
          <td style="font-family:var(--mono);font-size:.8rem;">${u.id}</td>
          <td>${roleBadge(u.role)}</td>
          <td><span class="badge ${u.status==='active'?'badge-approved':u.status==='pending'?'badge-pending':'badge-rejected'}">${u.status.toUpperCase()}</span></td>
          <td style="font-size:.78rem;color:var(--text3);">${fmtDate(u.createdAt)}</td>
          <td>
            ${u.id !== user.id ? `<button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">EDIT</button>` : '<span style="font-family:var(--mono);font-size:.65rem;color:var(--text3);">YOU</span>'}
          </td>
        </tr>
      `).join('');
    }

    function filterBookings() {
      const q  = document.getElementById('bk-search')?.value.toLowerCase();
      const st = document.getElementById('bk-status')?.value;
      const all = DB.getAllBookings();
      const filtered = all.filter(b=>{
        if (st && b.status!==st) return false;
        const u = DB.getUserById(b.userId);
        if (q && !`${u?.name||''} ${b.facility} ${b.purpose}`.toLowerCase().includes(q)) return false;
        return true;
      });
      const tbody = document.getElementById('bk-tbody');
      if (!tbody) return;
      tbody.innerHTML = filtered.map(b=>{
        const u = DB.getUserById(b.userId);
        return `<tr>
          <td style="font-family:var(--mono);font-size:.7rem;">${b.id}</td>
          <td>
            <div style="font-size:.85rem;">${u?.name||'—'}</div>
            <div style="font-family:var(--mono);font-size:.68rem;color:var(--text3);">ID: ${u?.id||'—'} · ${u?.role||'—'}</div>
          </td>
          <td style="font-size:.82rem;">${b.facility}</td>
          <td style="font-size:.78rem;">${fmtDate(b.date)}</td>
          <td>${badge(b.status)}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="viewBooking('${b.id}')">VIEW</button></td>
        </tr>`;
      }).join('');
    }

    function approveUser(id, name) {
      DB.updateUser(id, { status:'active' });
      DB.addNotif(id, `Your account has been approved! You can now log in to SchoolBook.`);
      toast(`${name} approved!`,'ok');
      renderTab();
    }

    function rejectUser(id, name) {
      if (!confirm(`Reject ${name}'s account?`)) return;
      DB.updateUser(id, { status:'rejected' });
      toast(`${name} rejected.`,'err');
      renderTab();
    }

    function editUser(id) {
      const u = DB.getUsers().find(x=>x.id===id);
      if (!u) return;
      document.getElementById('user-modal-body').innerHTML = `
        <h2>// EDIT USER</h2>
        <div style="margin-bottom:1.2rem;">
          <div style="font-family:var(--mono);font-size:.9rem;">${u.name}</div>
          <div style="font-family:var(--mono);font-size:.7rem;color:var(--text3);">ID: ${u.id}</div>
        </div>
        <div class="form-group">
          <label class="form-label">ROLE</label>
          <select id="edit-role" class="form-select">
            ${['student','faculty','custodian','finance','president'].map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${r.toUpperCase()}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">STATUS</label>
          <select id="edit-status" class="form-select">
            <option value="active"   ${u.status==='active'?'selected':''}>ACTIVE</option>
            <option value="pending"  ${u.status==='pending'?'selected':''}>PENDING</option>
            <option value="rejected" ${u.status==='rejected'?'selected':''}>REJECTED</option>
          </select>
        </div>
        <div style="font-family:var(--mono);font-size:.68rem;color:var(--text3);margin-bottom:1rem;">Note: Role changes take effect on next login.</div>
        <button class="btn btn-primary w100" style="justify-content:center;" onclick="saveEdit('${u.id}')">SAVE CHANGES</button>
      `;
      document.getElementById('user-overlay').classList.add('open');
    }

    function saveEdit(id) {
      const role   = document.getElementById('edit-role').value;
      const status = document.getElementById('edit-status').value;
      DB.updateUser(id, { role, status });
      toast('User updated!','ok');
      document.getElementById('user-overlay').classList.remove('open');
      renderTab();
    }

    function viewBooking(id) {
      const b = DB.getBookingById(id);
      if (!b) return;
      const u = DB.getUserById(b.userId);
      const steps = DB.getStepsForBooking(id);
      document.getElementById('bk-modal-body').innerHTML = `
        <h2>// BOOKING DETAIL</h2>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;">
          <span style="font-family:var(--mono);font-size:.7rem;color:var(--text3);">${b.id}</span>
          ${badge(b.status)}
        </div>
        <div style="font-family:var(--mono);font-size:.74rem;color:var(--text3);margin-bottom:1rem;">
          By ${u?.name||'—'} (ID: ${u?.id||'—'} · ${u?.role||'—'}) · Filed ${fmtDT(b.createdAt)}
        </div>
        <div class="grid-2 gap1 mb2">
          <div><div class="section-label">FACILITY</div><div style="font-family:var(--mono);font-size:.8rem;">${b.facility}</div></div>
          <div><div class="section-label">DATE</div><div style="font-family:var(--mono);font-size:.8rem;">${fmtDate(b.date)}</div></div>
          <div><div class="section-label">TIME</div><div style="font-family:var(--mono);font-size:.8rem;">${fmtTime(b.timeStart)} – ${fmtTime(b.timeEnd)}</div></div>
          <div><div class="section-label">PARTICIPANTS</div><div style="font-family:var(--mono);font-size:.8rem;">${b.participants}</div></div>
          <div style="grid-column:span 2;"><div class="section-label">PURPOSE</div><div style="font-family:var(--mono);font-size:.8rem;">${b.purpose}</div></div>
          <div><div class="section-label">LED WALL</div><div style="font-family:var(--mono);font-size:.8rem;">${b.useLED?'YES':'NO'}</div></div>
          ${b.notes?`<div style="grid-column:span 2;"><div class="section-label">NOTES</div><div style="font-size:.78rem;color:var(--text2);">${b.notes}</div></div>`:''}
        </div>
        <div class="divider"></div>
        <div class="section-label">// APPROVAL TRAIL</div>
        <div class="steps">
          ${steps.map((s,i)=>`
            <div class="step">
              <div class="step-dot ${stepDotClass(s.status)}">${stepDotIcon(s.status)}</div>
              <div class="step-body">
                <div class="step-title">${i+1}. ${s.label}</div>
                <div class="step-sub">${s.status.toUpperCase()}${s.actedAt?' · '+fmtDT(s.actedAt):''}</div>
                ${s.note?`<div class="step-note">"${s.note}"</div>`:''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('bk-overlay').classList.add('open');
    }

    ['user-overlay','bk-overlay'].forEach(id=>{
      document.getElementById(id).addEventListener('click', e=>{
        if (e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open');
      });
    });

    renderTab();
  </script>
</body>
</html>
